<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker + Pomodoro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Time Tracker</h1>
            <div class="daily-total">
                <span class="label">Today:</span>
                <span id="dailyTotal" class="time">0h 0m</span>
            </div>
        </header>

        <main>
            <!-- Task List -->
            <section class="task-section">
                <h2>Tasks</h2>
                <div class="task-input">
                    <input
                        type="text"
                        id="taskInput"
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addTaskBtn">Add</button>
                </div>
                <ul id="taskList" class="task-list"></ul>
            </section>

            <!-- Active Timer -->
            <section class="timer-section">
                <h2>Active Timer</h2>
                <div id="timerArea" class="timer-area">
                    <p class="no-task">Select a task to start tracking</p>
                </div>
            </section>

            <!-- Pomodoro -->
            <section class="pomodoro-section">
                <h2>Pomodoro</h2>
                <div class="pomodoro-controls">
                    <button id="startPomodoroBtn" class="btn-primary">Start Focus Session</button>
                </div>
                <div id="pomodoroArea" class="pomodoro-area">
                    <p class="no-session">Not running</p>
                </div>
                <details class="settings-details">
                    <summary>Settings</summary>
                    <div class="settings">
                        <label>
                            Work Duration (minutes):
                            <input type="number" id="workMinutes" min="1" value="30">
                        </label>
                        <label>
                            Break Duration (minutes):
                            <input type="number" id="breakMinutes" min="1" value="5">
                        </label>
                    </div>
                </details>
            </section>
        </main>
    </div>

    <audio id="alarmSound" preload="auto">
        <!-- Placeholder for alarm sound; will be filled in later -->
    </audio>

    <script src="config.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
